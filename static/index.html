<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookly Support</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 500px;
            height: 700px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 20px 24px;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header p { font-size: 12px; opacity: 0.65; margin-top: 3px; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .message {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.55;
            white-space: pre-wrap;
        }
        .message.user {
            background: #1a1a2e;
            color: white;
            align-self: flex-end;
            border-radius: 16px 16px 4px 16px;
        }
        .message.agent {
            background: #f4f4f6;
            color: #1a1a2e;
            align-self: flex-start;
            border-radius: 16px 16px 16px 4px;
        }
        .message.loading {
            background: #f4f4f6;
            color: #999;
            align-self: flex-start;
        }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input {
            flex: 1;
            padding: 11px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #1a1a2e; }
        button#send-btn {
            padding: 11px 20px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        button#send-btn:hover { background: #2d2d4e; }
        button#send-btn:disabled { background: #ccc; cursor: not-allowed; }
        .reset-btn {
            font-size: 12px;
            color: #999;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 4px;
        }
        .reset-btn:hover { color: #555; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>📚 Bookly Support</h1>
            <p>AI-powered customer service · Try order ORD-1234 or ORD-5678</p>
        </div>
        <div class="messages" id="messages">
            <div class="message agent">
                Hi! I'm Bookly's support assistant. I can help you check your order status, process a return, or answer questions about our shipping and policies. What can I help you with today?
            </div>
        </div>
        <div class="input-area">
            <input
                type="text"
                id="input"
                placeholder="Type a message..."
                onkeypress="if(event.key==='Enter' && !event.shiftKey) sendMessage()"
                autofocus
            >
            <button id="send-btn" onclick="sendMessage()">Send</button>
            <button class="reset-btn" onclick="resetChat()" title="Start over">↺</button>
        </div>
    </div>

    <script>
        const sessionId = 'session_' + Date.now();

        async function sendMessage() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';
            setLoading(true);

            const loadingEl = addMessage('Thinking...', 'loading');

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });
                const data = await res.json();
                loadingEl.remove();
                addMessage(data.response || ('Error: ' + data.error), 'agent');
            } catch (err) {
                loadingEl.remove();
                addMessage('Something went wrong. Please try again.', 'agent');
            }

            setLoading(false);
            input.focus();
        }

        async function resetChat() {
            await fetch('/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId })
            });
            const messages = document.getElementById('messages');
            messages.innerHTML = '';
            addMessage("Chat reset! How can I help you?", 'agent');
        }

        function addMessage(text, type) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

        function setLoading(loading) {
            document.getElementById('send-btn').disabled = loading;
            document.getElementById('input').disabled = loading;
        }
    </script>
</body>
</html>
